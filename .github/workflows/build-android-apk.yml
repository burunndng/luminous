name: Build Android APK

on:
  push:
    branches:
      - claude/generate-android-apk-z7Hyn
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and install Yarn
        run: corepack enable

      - name: Install dependencies
        working-directory: frontend
        run: yarn install

      - name: Run Expo prebuild (generate native Android project)
        working-directory: frontend
        env:
          METRO_CACHE_ROOT: /tmp/metro-cache
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/android/gradle/wrapper/gradle-wrapper.properties', 'frontend/android/**/*.gradle*') }}
          restore-keys: |
            gradle-

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luminous-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK info
        run: |
          APK="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          ls -lh "$APK"
          echo "APK size: $(du -sh $APK | cut -f1)"
